<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 64" width="260" height="64" role="img" aria-label="Extractor URL — logo completo">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4F6EF7"/>
      <stop offset="100%" stop-color="#3A56D4"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4F6EF7"/>
      <stop offset="100%" stop-color="#3A56D4"/>
    </linearGradient>
  </defs>

  <!-- Mark (icon) 64x64 -->
  <circle cx="32" cy="32" r="30" fill="url(#bgGrad)"/>
  <circle cx="32" cy="32" r="5.5" fill="white"/>

  <!-- Rama derecha (0°) -->
  <line x1="37.5" y1="32" x2="52" y2="32"
        stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.92"/>
  <circle cx="52" cy="32" r="3.5" fill="#63C2A9"/>

  <!-- Rama inferior-izquierda (120°) -->
  <line x1="29.25" y1="36.76" x2="19.5" y2="53.69"
        stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.92"/>
  <circle cx="19.5" cy="53.69" r="3.5" fill="#63C2A9"/>

  <!-- Rama superior-izquierda (240°) -->
  <line x1="29.25" y1="27.24" x2="19.5" y2="10.31"
        stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.92"/>
  <circle cx="19.5" cy="10.31" r="3.5" fill="#63C2A9"/>

  <!-- Texto: "Extractor" bold + "URL" regular -->
  <text x="76" y="29"
        font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif"
        font-size="22" font-weight="700" letter-spacing="-0.3"
        fill="url(#textGrad)">Extractor</text>
  <text x="76" y="51"
        font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif"
        font-size="14" font-weight="400" letter-spacing="2"
        fill="#6B7280">URL</text>
</svg>
